<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Subtle grid -->
  <g opacity="0.05" stroke="#fff" stroke-width="1">
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="0" y1="157" x2="1200" y2="157"/><line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
  </g>
  <!-- Accent bar -->
  <rect x="100" y="240" width="120" height="4" rx="2" fill="url(#accent)"/>
  <!-- Title -->
  <text x="100" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="900" fill="#ffffff" letter-spacing="-2">AU Nexus Method</text>
  <!-- Subtitle -->
  <text x="100" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="300" fill="#94a3b8">Designing Intelligent Academic Systems</text>
  <!-- Tags -->
  <text x="100" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500" fill="#64748b">6 Principles  ·  6 Core Models  ·  8-Step Build Process</text>
  <!-- Org -->
  <text x="100" y="530" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#475569">Atlantis University</text>
